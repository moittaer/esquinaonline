# ==========================================================================
#  RELATÓRIO BEQUANT  —  bloco exclusivo e independente
#  URL: esquina.online/reportbequant  (a barra do navegador permanece)
#  Proxy 200 (sem redirect visível) para o deploy do Vercel.
#  Os assets (imagens, vídeo, css, js) são referenciados por URL ABSOLUTA
#  do Vercel dentro do próprio HTML, então este bloco NÃO depende de
#  nenhuma regra de /assets, /css ou /js — não colide com o Villa.
# ==========================================================================
[[redirects]]
  from = "/reportbequant"
  to = "https://bequant-reports-junho.vercel.app/"
  status = 200
  force = true

[[redirects]]
  from = "/reportbequant/*"
  to = "https://bequant-reports-junho.vercel.app/:splat"
  status = 200
  force = true

# ==========================================================================
#  RELATÓRIO VILLA  —  bloco original, mantido como estava
#  Usa caminhos relativos, por isso precisa das regras de /css, /js e
#  /assets na raiz (NÃO REMOVER: o Villa quebra sem elas).
# ==========================================================================
[[redirects]]
  from = "/reportmaiovilla"
  to = "https://relatorio-villa-mai2026.vercel.app/"
  status = 200
  force = true

[[redirects]]
  from = "/reportmaiovilla/*"
  to = "https://relatorio-villa-mai2026.vercel.app/:splat"
  status = 200
  force = true

# Assets do relatório Villa — só ativa se o arquivo não existir no Netlify
[[redirects]]
  from = "/css/*"
  to = "https://relatorio-villa-mai2026.vercel.app/css/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/js/*"
  to = "https://relatorio-villa-mai2026.vercel.app/js/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/assets/*"
  to = "https://relatorio-villa-mai2026.vercel.app/assets/:splat"
  status = 200
  force = false
