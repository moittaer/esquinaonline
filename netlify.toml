# Relatório Bequant — proxy mantendo a URL esquina.online/reportbequant
# Os assets são referenciados por URL absoluta do Vercel no próprio HTML,
# então não há colisão com os assets do relatório Villa.
[[redirects]]
  from = "/reportbequant"
  to = "https://bequant-reports-junho.vercel.app/"
  status = 200
  force = true

[[redirects]]
  from = "/reportbequant/*"
  to = "https://bequant-reports-junho.vercel.app/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/reportmaiovilla"
  to = "https://relatorio-villa-mai2026.vercel.app/"
  status = 200
  force = true

[[redirects]]
  from = "/reportmaiovilla/*"
  to = "https://relatorio-villa-mai2026.vercel.app/:splat"
  status = 200
  force = true

# Assets do relatório Villa — só ativa se o arquivo não existir no Netlify
[[redirects]]
  from = "/css/*"
  to = "https://relatorio-villa-mai2026.vercel.app/css/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/js/*"
  to = "https://relatorio-villa-mai2026.vercel.app/js/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/assets/*"
  to = "https://relatorio-villa-mai2026.vercel.app/assets/:splat"
  status = 200
  force = false
